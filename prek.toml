# === taplo format (all TOML files across repo) ===

[[repos]]
    repo = "local"
    hooks = [
        { entry = "taplo format", id = "taplo-format", language = "system", name = "taplo-format", types_or = [
            "toml",
        ] },
    ]

    # === lsp workspace ===

[[repos]]
    repo = "local"
    hooks = [
        { always_run = true, entry = "cd lsp && uv run python scripts/update_vendored_docassemble_base_util.py", id = "update-vendored-docassemble-base-stubs", language = "system", name = "update-vendored-docassemble-base-stubs", pass_filenames = false },
    ]

[[repos]]
    repo = "https://github.com/astral-sh/ruff-pre-commit"
    rev = "v0.15.19"
    hooks = [
        { args = [
            "--fix",
        ], files = "^lsp/", id = "ruff-check", types_or = [
            "pyi",
            "python",
        ] },
        { files = "^lsp/", id = "ruff-format", types_or = [
            "pyi",
            "python",
        ] },
    ]

[[repos]]
    repo = "local"
    hooks = [
        { entry = "cd lsp && uv run mypy src/", files = "^lsp/", id = "mypy", language = "system", name = "mypy", pass_filenames = false, types_or = [
            "pyi",
            "python",
        ] },
        { entry = "cd lsp && uv run pytest tests -n auto", files = "^lsp/", id = "pytest", language = "system", name = "pytest", pass_filenames = false, types_or = [
            "pyi",
            "python",
        ] },
    ]

    # === vscode workspace ===

[[repos]]
    repo  = "https://github.com/oxc-project/mirrors-oxfmt"
    rev   = "v0.56.0"
    hooks = [{ files = "^vscode/", id = "oxfmt" }]

[[repos]]
    repo  = "https://github.com/oxc-project/mirrors-oxlint"
    rev   = "v1.71.0"
    hooks = [{ args = ["--fix"], files = "^vscode/", id = "oxlint" }]
