[tools]
    "pipx:ruff" = "latest"
    python      = "3.14"
    uv          = "latest"

[settings]
    python.uv_venv_auto = "create|source"

[tasks.sync]
    description = "Install/sync LSP dev dependencies"
    run         = "uv sync"

[tasks.lsp]
    description = "Run the docassemble-lsp language server (speaks LSP over stdio)"
    run         = "uv run docassemble-lsp lsp"

[tasks.format]
    description = "Format Python and TOML files"
    depends     = ["sync", "//:format:toml"]
    run         = "uv run ruff format"

[tasks."format:check"]
    description = "Check Python and TOML formatting"
    depends     = ["sync", "//:format:toml:check"]
    run         = "uv run ruff format --check"

[tasks.lint]
    description = "Check Python lint"
    depends     = ["sync", "//:lint:toml"]
    run         = "uv run ruff check"

[tasks."lint:fix"]
    description = "Fix Python lint"
    depends     = ["sync", "//:lint:toml"]
    run         = "uv run ruff check --fix"

[tasks.type]
    description = "mypy on src/"
    depends     = ["sync"]
    run         = "uv run mypy src/"

[tasks.test]
    description = "pytest with xdist"
    depends     = ["sync"]
    run         = "uv run pytest -q -n auto"

[tasks."test:coverage"]
    description = "pytest with coverage reports"
    depends     = ["sync"]
    run         = "uv run pytest --cov --cov-report=term-missing --cov-report=html"

[tasks."test:all-pythons"]
    description = "Run tests against all supported Python versions"
    run         = "trap 'rm -rf .venv-3.10 .venv-3.11 .venv-3.12 .venv-3.13 .venv-3.14' EXIT; for v in 3.10 3.11 3.12 3.13 3.14; do echo \"=== Python $v ===\"; UV_PROJECT_ENVIRONMENT=.venv-$v DYLD_FALLBACK_LIBRARY_PATH={{ env.DYLD_FALLBACK_LIBRARY_PATH | quote }} uv run --python $v --only-group test pytest -n auto || exit 1; done"

[tasks."vendor:stubs"]
    description = "Regenerate vendored docassemble stubs"
    depends     = ["sync"]
    run         = "uv run python scripts/update_vendored_docassemble_base_util.py"

[tasks.check]
    description = "Check formatting, lint, type, and test"
    depends     = ["format:check", "lint", "type", "test"]

[tasks.gate]
    description = "Full pre-release gate for LSP"
    depends     = ["format:check", "lint", "type", "test:all-pythons"]
