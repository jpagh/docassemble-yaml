id: E204_E205_E207_E309_nested_js_visibility
question: |
  Fixture screen with nested visibility and JavaScript modifier issues.
fields:
  - Fruit: fruit
    datatype: yesnoradio
  - Vegetable: vegetable
    datatype: yesnoradio
    show if: fruit
  - Grain: grain
    datatype: yesnoradio
    show if: vegetable
  - Dairy: dairy
    datatype: yesnoradio
    show if: grain
  - Broken JS syntax: broken_js_syntax
    js show if: |
      (val("fruit") === "apple"
  - Missing val call: missing_val_call
    js show if: |
      true && false
  - Unquoted val arg: unquoted_val
    js show if: |
      val(fruit) === "apple"

