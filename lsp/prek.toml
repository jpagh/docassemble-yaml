[[repos]]
    hooks = [
        { always_run = true, entry = "uv run python scripts/update_vendored_docassemble_base_util.py", id = "update-vendored-docassemble-base-stubs", language = "system", name = "update-vendored-docassemble-base-stubs", pass_filenames = false },
    ]
    repo = "local"

[[repos]]
    hooks = [
        { entry = "taplo format", id = "taplo-format", language = "system", name = "taplo-format", types_or = [
            "toml",
        ] },
    ]
    repo = "local"

[[repos]]
    hooks = [
        # Run the linter.
        { args = ["--fix"], id = "ruff-check", types_or = ["pyi", "python"] },

        # Run the formatter.
        { id = "ruff-format", types_or = ["pyi", "python"] },
    ]
    repo = "https://github.com/astral-sh/ruff-pre-commit"
    rev = "v0.15.17" # Ruff version.

[[repos]]
    hooks = [
        { entry = "uv run mypy src/", id = "mypy", language = "system", name = "mypy", pass_filenames = false, types_or = [
            "pyi",
            "python",
        ] },
        { entry = "uv run pytest tests -n auto", id = "pytest", language = "system", name = "pytest", pass_filenames = false, types_or = [
            "pyi",
            "python",
        ] },
    ]
    repo = "local"
