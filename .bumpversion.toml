[tool.bumpversion]
    commit = true
    current_version = "26.6.2"
    message = "Bump version: {current_version} → {new_version}"
    parse = """(?x)
(?P<release>
    (?:[0-9]{2})\\.    # YY.
    (?:1[0-2]|[1-9])   # M or MM
)
\\.(?P<patch>\\d+)
"""
    pre_commit_hooks = ["node scripts/update-changelog.mjs", "scripts/bump-lock.sh"]
    serialize = ["{release}.{patch}"]
    tag = true
    tag_name = "v{new_version}"

    [[tool.bumpversion.files]]
        filename = "lsp/pyproject.toml"
        replace  = 'version = "{new_version}"'
        search   = 'version = "{current_version}"'

    [[tool.bumpversion.files]]
        filename = "vscode/package.json"
        replace  = '"version": "{new_version}"'
        search   = '"version": "{current_version}"'

    [[tool.bumpversion.files]]
        filename = "VERSION"
        replace  = "{new_version}"
        search   = "{current_version}"

    [tool.bumpversion.parts.release]
        calver_format = "{0Y}.{MM}"

    [tool.bumpversion.parts.patch]
        first_value = 0
