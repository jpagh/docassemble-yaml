[[repos]]
    hooks = [
        { entry = "taplo format", id = "taplo-format", language = "system", name = "taplo-format", types_or = [
            "toml",
        ] },
    ]
    repo = "local"

[[repos]]
    hooks = [{ id = "oxfmt" }]
    repo  = "https://github.com/oxc-project/mirrors-oxfmt"
    rev   = "v0.53.0"

[[repos]]
    hooks = [{ id = "oxlint" }]
    repo  = "https://github.com/oxc-project/mirrors-oxlint"
    rev   = "v1.68.0"

